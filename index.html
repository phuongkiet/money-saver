<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <script>
      // Ngăn ngừa lỗi trắng màn hình (Chunk Load Error) khi deploy code mới
      window.addEventListener('error', function (e) {
        var message = e.message || '';
        if (
          message.indexOf('dynamically imported module') !== -1 ||
          message.indexOf('Failed to fetch dynamically imported module') !== -1 ||
          message.indexOf('Importing a module script failed') !== -1 ||
          (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK') && e.target.src && e.target.src.indexOf('/assets/') !== -1)
        ) {
          console.warn('Phát hiện lỗi tải tài nguyên cũ do deploy code mới. Đang tự động tải lại phiên bản mới nhất...');
          window.location.reload();
        }
      }, true);
    </script>
    <title>Money Saver - Trợ Lý Quản Lý Chi Tiêu</title>
    
    <!-- Google Fonts: Be Vietnam Pro -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- PWA Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Money Saver">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#8fae8d">
  </head>
  <body class="bg-sage-light dark:bg-sage-dark transition-colors duration-300 font-vietnam antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
